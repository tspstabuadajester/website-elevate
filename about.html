<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CMS_SEO_START -->
  <title></title>
  <meta name="description" content="" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta property="og:url" content="" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image" content="" />
  <!-- CMS_SEO_END -->

  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Lato', 'sans-serif'],
            hero: ['"El Messiri"', 'sans-serif']
          },
          colors: {
            elevate: {
              50: '#f8f5fc',
              100: '#f3f0f8',
              200: '#e8dff5',
              300: '#d4b5fb',
              400: '#b989ee',
              500: '#9b67d5',
              600: '#7d64a8',
              700: '#6b5494',
              800: '#4a3a6e',
              900: '#33204f'
            },
            ink: '#2d2640'
          },
          boxShadow: {
            card: '0 8px 30px rgba(45, 38, 64, .08)',
            soft: '0 20px 60px rgba(125, 100, 168, .14)'
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="assets/style.css" />

</head>

<body class="overflow-x-hidden antialiased" data-page="about">

  <!-- NAV -->
  <header class="nav-blur fixed inset-x-0 top-0 z-50">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-5 py-3.5 lg:px-8">
      <a href="index.html" class="flex shrink-0 items-center" aria-label="Elevate home">
        <img data-logo src="assets/logo.png" alt="" class="brand-logo" width="240" height="60" decoding="async" />
      </a>
      <nav id="nav-links" class="hidden items-center gap-7 text-sm font-semibold text-slate-600 lg:flex"></nav>
      <a id="nav-cta" href="index.html#appointment" class="hidden shrink-0 rounded-full bg-elevate-600 px-5 py-2.5 text-sm font-bold text-white shadow-md transition hover:bg-elevate-700 sm:inline-flex"></a>
      <button class="rounded-xl border border-elevate-100 bg-white p-2 text-elevate-800 lg:hidden" aria-label="Open menu">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="pt-[72px]">

    <!-- HERO -->
    <section class="about-hero">
      <div class="hero-rings hero-rings--tr" aria-hidden="true">
        <span class="hero-ring hero-ring--1"></span>
        <span class="hero-ring hero-ring--2"></span>
        <span class="hero-ring hero-ring--3"></span>
      </div>
      <div class="hero-rings hero-rings--bl" aria-hidden="true">
        <span class="hero-ring hero-ring--1"></span>
        <span class="hero-ring hero-ring--2"></span>
        <span class="hero-ring hero-ring--3"></span>
      </div>

      <span class="about-sparkle about-sparkle--1" aria-hidden="true">✦</span>
      <span class="about-sparkle about-sparkle--2" aria-hidden="true">○</span>
      <span class="about-sparkle about-sparkle--3" aria-hidden="true">✦</span>

      <div class="about-hero__content mx-auto max-w-3xl px-5 text-center lg:px-8">
        <h1 id="page-hero-heading" class="page-hero-animate page-hero-animate--1 serif text-4xl font-bold text-elevate-900 sm:text-5xl lg:text-6xl"></h1>
        <p id="page-hero-intro" class="page-hero-animate page-hero-animate--2 mx-auto mt-5 max-w-2xl text-sm leading-7 text-slate-700 sm:text-base"></p>
      </div>

      <div id="about-gallery" class="about-gallery reveal-stagger mx-auto max-w-6xl px-5 lg:px-8"></div>

      <svg class="about-hero__wave" viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#ffffff" d="M0,64 C240,104 480,24 720,64 C960,104 1200,44 1440,72 L1440,120 L0,120 Z"/>
      </svg>
    </section>

    <!-- MISSION -->
    <section class="bg-white py-16 lg:py-24">
      <div class="mx-auto max-w-7xl px-5 lg:px-8">
        <h2 id="mission-heading" class="reveal serif max-w-4xl text-3xl font-bold leading-tight text-elevate-900 sm:text-4xl lg:text-[2.65rem]"></h2>
        <div id="mission-columns" class="reveal-stagger mt-10 grid gap-8 md:grid-cols-2 md:gap-12 lg:mt-12"></div>
      </div>
    </section>

    <!-- FOUNDER -->
    <section class="bg-white pb-20 lg:pb-28">
      <div class="mx-auto grid max-w-7xl items-center gap-12 px-5 lg:grid-cols-2 lg:gap-16 lg:px-8">
        <div class="reveal reveal-left about-founder__visual">
          <img
            id="founder-image"
            src=""
            alt=""
            class="about-founder__photo"
            width="767"
            height="1024"
            decoding="async"
          />
          <div class="about-founder__quote-card">
            <p id="founder-quote-text" class="text-sm font-bold leading-snug text-elevate-900 sm:text-base"></p>
            <p id="founder-quote-attribution" class="mt-1 text-xs font-semibold text-elevate-600"></p>
          </div>
        </div>
        <div class="reveal reveal-right">
          <h2 id="founder-heading" class="serif text-3xl font-bold leading-tight text-elevate-900 sm:text-4xl"></h2>
          <p id="founder-paragraph" class="mt-5 text-sm leading-7 text-slate-600 sm:text-base"></p>
          <blockquote id="founder-blockquote" class="about-blockquote mt-8 text-sm leading-7 text-slate-700 sm:text-base"></blockquote>
        </div>
      </div>
    </section>

    <!-- FEATURES -->
    <section class="bg-gradient-to-b from-elevate-50/60 to-white py-20 lg:py-28">
      <div class="mx-auto max-w-7xl px-5 lg:px-8">
        <div class="reveal relative mx-auto max-w-3xl text-center">
          <span class="about-sparkle about-sparkle--4" aria-hidden="true">✦</span>
          <h2 id="features-heading" class="serif text-3xl font-bold text-elevate-900 sm:text-4xl"></h2>
          <p id="features-intro" class="mx-auto mt-4 max-w-2xl text-sm leading-7 text-slate-600 sm:text-base"></p>
        </div>
        <div id="features-grid" class="reveal-stagger mt-14 grid gap-8 md:grid-cols-3 lg:mt-16 lg:gap-10"></div>
      </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="bg-elevate-100 py-20 lg:py-24">
      <div class="mx-auto max-w-7xl px-5 lg:px-8">
        <div class="reveal mx-auto max-w-3xl text-center">
          <h2 id="testimonials-heading" class="serif text-2xl font-bold leading-snug text-elevate-800 sm:text-3xl lg:text-4xl"></h2>
        </div>
        <div
          id="testimonials-grid"
          class="reveal-stagger mt-12 grid gap-5 sm:grid-cols-2 lg:grid-cols-3 lg:gap-6"
        ></div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="contact" class="bg-elevate-800 text-white">
    <div class="reveal mx-auto grid max-w-7xl gap-10 px-5 py-14 md:grid-cols-2 lg:grid-cols-[1.1fr_1.4fr_.9fr] lg:gap-12 lg:px-8">
      <div>
        <a href="index.html" aria-label="Elevate home">
          <img data-logo src="assets/logo.png" alt="" class="brand-logo brand-logo--footer" width="220" height="72" decoding="async"/>
        </a>
        <p id="footer-description" class="mt-5 max-w-xs text-sm leading-7 text-white/75"></p>
      </div>
      <div class="grid gap-8 sm:grid-cols-2">
        <div>
          <h4 id="footer-address1-title" class="text-xs font-extrabold uppercase tracking-widest"></h4>
          <ul id="footer-address1-list" class="mt-4 space-y-4 text-sm leading-6 text-white/80"></ul>
        </div>
        <div>
          <h4 id="footer-address2-title" class="text-xs font-extrabold uppercase tracking-widest"></h4>
          <ul id="footer-address2-list" class="mt-4 space-y-4 text-sm leading-6 text-white/80"></ul>
        </div>
      </div>
      <div>
        <h4 class="text-xs font-extrabold uppercase tracking-widest">Quick Links</h4>
        <nav id="footer-quick-links" class="mt-4 space-y-2.5 text-sm font-medium text-white/80"></nav>
      </div>
    </div>
    <div class="border-t border-white/10 py-5 text-center text-xs text-white/60">
      <span id="footer-copyright"></span>
    </div>
  </footer>

  <script src="assets/render-content.js"></script>
  <script src="assets/animations.js"></script>

</body>
</html>
