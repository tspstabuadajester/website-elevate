<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CMS_SEO_START -->
  <title></title>
  <meta name="description" content="" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta property="og:url" content="" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image" content="" />
  <!-- CMS_SEO_END -->

  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Lato', 'sans-serif'],
            hero: ['"El Messiri"', 'sans-serif']
          },
          colors: {
            elevate: {
              50: '#f8f5fc',
              100: '#f3f0f8',
              200: '#e8dff5',
              300: '#d4b5fb',
              400: '#b989ee',
              500: '#9b67d5',
              600: '#7d64a8',
              700: '#6b5494',
              800: '#4a3a6e',
              900: '#33204f'
            },
            ink: '#2d2640'
          },
          boxShadow: {
            card: '0 8px 30px rgba(45, 38, 64, .08)',
            soft: '0 20px 60px rgba(125, 100, 168, .14)'
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="assets/style.css" />

</head>

<body class="overflow-x-hidden antialiased" data-page="contact">

  <!-- NAV -->
  <header class="nav-blur fixed inset-x-0 top-0 z-50">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-5 py-3.5 lg:px-8">
      <a href="index.html" class="flex shrink-0 items-center" aria-label="Elevate home">
        <img data-logo src="assets/logo.png" alt="" class="brand-logo" width="240" height="60" decoding="async" />
      </a>
      <nav id="nav-links" class="hidden items-center gap-7 text-sm font-semibold text-slate-600 lg:flex"></nav>
      <a id="nav-cta" href="index.html#appointment" class="hidden shrink-0 rounded-full bg-elevate-600 px-5 py-2.5 text-sm font-bold text-white shadow-md transition hover:bg-elevate-700 sm:inline-flex"></a>
      <button
        id="nav-toggle"
        type="button"
        class="nav-toggle rounded-xl border border-elevate-100 bg-white p-2 text-elevate-800 lg:hidden"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="nav-mobile"
      >
        <svg class="nav-toggle__icon nav-toggle__icon--open h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg class="nav-toggle__icon nav-toggle__icon--close h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <div id="nav-mobile" class="nav-mobile lg:hidden" aria-hidden="true">
      <nav id="nav-mobile-links" class="nav-mobile__links"></nav>
      <a id="nav-mobile-cta" class="nav-mobile__cta" href="index.html#appointment"></a>
    </div>
  </header>

  <main class="pt-[72px]">

    <!-- HERO -->
    <section class="contact-hero">
      <div class="hero-rings hero-rings--tr" aria-hidden="true">
        <span class="hero-ring hero-ring--1"></span>
        <span class="hero-ring hero-ring--2"></span>
        <span class="hero-ring hero-ring--3"></span>
      </div>
      <div class="hero-rings hero-rings--bl" aria-hidden="true">
        <span class="hero-ring hero-ring--1"></span>
        <span class="hero-ring hero-ring--2"></span>
        <span class="hero-ring hero-ring--3"></span>
      </div>

      <div class="contact-hero__content mx-auto max-w-3xl px-5 py-14 text-center lg:px-8 lg:py-20">
        <h1 id="contact-hero-heading" class="page-hero-animate page-hero-animate--1 serif text-4xl font-bold text-elevate-900 sm:text-5xl lg:text-6xl"></h1>
        <p id="contact-hero-intro" class="page-hero-animate page-hero-animate--2 mx-auto mt-5 max-w-2xl text-sm leading-7 text-slate-600 sm:text-base"></p>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="bg-white py-16 lg:py-24">
      <div class="contact-info mx-auto max-w-2xl px-5 lg:px-8">
        <div class="reveal text-center">
          <p id="contact-info-kicker" class="section-kicker"></p>
          <h2 id="contact-info-heading" class="serif mt-3 text-3xl font-bold text-elevate-900 sm:text-4xl"></h2>
          <p id="contact-info-intro" class="mx-auto mt-4 max-w-xl text-sm leading-7 text-slate-600 sm:text-base"></p>
        </div>

        <a id="contact-email" href="#" class="contact-email-card reveal mx-auto mt-8 flex w-full max-w-md items-center gap-4 rounded-2xl border border-elevate-100 bg-elevate-50 p-5 transition hover:border-elevate-200 hover:bg-elevate-100/80">
          <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-elevate-600 text-white" aria-hidden="true">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v.01L12 13l8-6.99V6H4Zm0 12h16V9.25l-7.4 6.45a1 1 0 0 1-1.2 0L4 9.25V18Z"/></svg>
          </span>
          <span>
            <span class="block text-xs font-bold uppercase tracking-widest text-elevate-600">Email</span>
            <span id="contact-email-label" class="mt-1 block text-sm font-semibold text-elevate-900"></span>
          </span>
        </a>

        <a id="contact-phone" href="#" class="contact-email-card reveal mx-auto mt-4 flex w-full max-w-md items-center gap-4 rounded-2xl border border-elevate-100 bg-elevate-50 p-5 transition hover:border-elevate-200 hover:bg-elevate-100/80">
          <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-elevate-600 text-white" aria-hidden="true">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2Z"/></svg>
          </span>
          <span>
            <span class="block text-xs font-bold uppercase tracking-widest text-elevate-600">Phone</span>
            <span id="contact-phone-label" class="mt-1 block text-sm font-semibold text-elevate-900"></span>
          </span>
        </a>

        <div id="contact-locations" class="reveal-stagger mt-8 space-y-4"></div>
      </div>
    </section>

    <!-- CRISIS POLICY -->
    <section class="bg-elevate-50 py-16 lg:py-24">
      <div class="mx-auto max-w-3xl px-5 lg:px-8">
        <div class="reveal crisis-policy rounded-3xl border border-elevate-200 bg-white p-6 shadow-card sm:p-8">
          <h2 id="crisis-heading" class="serif text-2xl font-bold text-elevate-900 sm:text-3xl"></h2>
          <div id="crisis-intro" class="mt-4 space-y-4 text-sm leading-7 text-slate-600 sm:text-base"></div>
          <h3 id="crisis-resources-heading" class="mt-8 text-sm font-extrabold uppercase tracking-widest text-elevate-700"></h3>
          <ul id="crisis-resources" class="reveal-stagger mt-4 space-y-3"></ul>
          <p id="crisis-patients-note" class="mt-8 rounded-xl bg-elevate-50 p-4 text-sm leading-7 text-slate-600"></p>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="bg-elevate-50 py-16 lg:py-24">
      <div class="mx-auto max-w-7xl px-5 lg:px-8">
        <div class="reveal purple-panel relative overflow-hidden rounded-3xl p-8 text-white shadow-soft sm:p-10 lg:mx-auto lg:max-w-4xl">
          <div class="pointer-events-none absolute -right-8 -top-8 opacity-[0.12]">
            <svg class="h-56 w-56" viewBox="0 0 200 200" fill="none" stroke="white" stroke-width="1.5">
              <path d="M100 170C72 120 72 78 100 35c28 43 28 85 0 135Z"/>
              <path d="M100 170C55 130 40 92 48 48c42 20 64 60 52 122Z"/>
              <path d="M100 170c45-40 60-78 52-122-42 20-64 60-52 122Z"/>
            </svg>
          </div>
          <div class="relative z-10 text-center">
            <h2 id="cta-heading" class="serif text-3xl font-bold sm:text-4xl"></h2>
            <p id="cta-description" class="mx-auto mt-3 max-w-xl text-sm leading-7 text-white/85"></p>
            <a id="cta-button" href="#" class="mt-6 inline-flex items-center rounded-full bg-white px-7 py-3.5 text-sm font-bold text-elevate-700 shadow-md transition hover:bg-elevate-50">
              <span data-cta-label></span>
              <svg class="ml-2 h-4 w-4 text-elevate-600" viewBox="0 0 20 20" fill="currentColor"><path d="M5.25 3A2.25 2.25 0 0 0 3 5.25v9.5A2.25 2.25 0 0 0 5.25 17h9.5A2.25 2.25 0 0 0 17 14.75v-9.5A2.25 2.25 0 0 0 14.75 3h-.25V2a.75.75 0 0 0-1.5 0v1H7V2a.75.75 0 0 0-1.5 0v1h-.25ZM4.5 8h11v6.75c0 .414-.336.75-.75.75h-9.5a.75.75 0 0 1-.75-.75V8Z"/></svg>
            </a>
          </div>
          <div id="cta-features" class="relative z-10 mt-10 grid gap-5 border-t border-white/20 pt-8 sm:grid-cols-3"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="bg-elevate-800 text-white">
    <div class="reveal mx-auto grid max-w-7xl gap-10 px-5 py-14 md:grid-cols-2 lg:grid-cols-[1.1fr_1.4fr_.9fr] lg:gap-12 lg:px-8">
      <div>
        <a href="index.html" aria-label="Elevate home">
          <img data-logo src="assets/logo.png" alt="" class="brand-logo brand-logo--footer" width="220" height="72" decoding="async"/>
        </a>
        <p id="footer-description" class="mt-5 max-w-xs text-sm leading-7 text-white/75"></p>
      </div>
      <div class="grid gap-8 sm:grid-cols-2">
        <div>
          <h4 id="footer-address1-title" class="text-xs font-extrabold uppercase tracking-widest"></h4>
          <ul id="footer-address1-list" class="mt-4 space-y-4 text-sm leading-6 text-white/80"></ul>
        </div>
        <div>
          <h4 id="footer-address2-title" class="text-xs font-extrabold uppercase tracking-widest"></h4>
          <ul id="footer-address2-list" class="mt-4 space-y-4 text-sm leading-6 text-white/80"></ul>
        </div>
      </div>
      <div>
        <h4 class="text-xs font-extrabold uppercase tracking-widest">Quick Links</h4>
        <nav id="footer-quick-links" class="mt-4 space-y-2.5 text-sm font-medium text-white/80"></nav>
      </div>
    </div>
    <div class="border-t border-white/10 py-5 text-center text-xs text-white/60">
      <span id="footer-copyright"></span>
    </div>
  </footer>

  <script src="assets/render-content.js"></script>
  <script src="assets/animations.js"></script>

</body>
</html>
